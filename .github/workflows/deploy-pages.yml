name: Deploy portfolio

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate GitHub contribution history
        run: node scripts/fetch-contributions.mjs
        env:
          GITHUB_USERNAME: hoanganhpeas
          GH_TOKEN: ${{ secrets.CONTRIBUTIONS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Prepare static website
        run: |
          mkdir -p _site
          cp index.html style.css script.js projects.json contributions.json CNAME _site/
          cp -R assets _site/assets

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
